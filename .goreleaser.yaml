version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: ghpm
    main: ./cmd/ghpm
    binary: ghpm
    ldflags:
      - -X main.version={{.Version}}
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - arm64
      - amd64

archives:
  - id: ghpm
    name_template: 'ghpm-{{ .Version }}-{{ .Os }}-{{ .Arch }}'
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - none*

checksum:
  name_template: 'checksums.txt'

release:
  draft: false
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
